name: Feature Request
description: 새 기능 제안
labels: ['enhancement']

body:
  - type: markdown
    attributes:
      value: 기능 제안 감사합니다.

  - type: textarea
    id: problem
    attributes:
      label: 해결하고 싶은 문제
      description: 현재 어떤 불편함이 있나요?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결책
      description: 어떻게 동작하면 좋을지 API 예시와 함께 설명해주세요.
      render: typescript

  - type: dropdown
    id: priority
    attributes:
      label: 중요도
      options:
        - 없으면 라이브러리를 쓰기 어렵다
        - 있으면 좋겠다
        - 아이디어 수준
    validations:
      required: true

  - type: checkboxes
    id: security-impact
    attributes:
      label: 보안 관련 기능인가요?
      options:
        - label: 네, tenant 격리 또는 cross-tenant 차단과 관련된 기능입니다
