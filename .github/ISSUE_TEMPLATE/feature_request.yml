name: Feature Request
description: Suggest a new feature or enhancement / 새 기능 또는 개선 제안
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Check the [PRD roadmap](../../docs/tenant-shield-PRD.md) — your idea might already be planned!
        [PRD 로드맵](../../docs/tenant-shield-PRD.md)을 먼저 확인해 주세요. 이미 계획된 기능일 수 있습니다.

  - type: textarea
    id: problem
    attributes:
      label: Problem / 문제
      description: What problem does this solve? What's missing today?
      placeholder: "Every time I do X, I have to manually Y which is error-prone..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution / 제안 솔루션
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: API sketch (optional) / API 스케치 (선택)
      render: typescript
      placeholder: |
        // Example of what the ideal API would look like
        @RequireTenant({ schema: true })
        async findAll() { ... }

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Core (context, middleware, decorator)
        - TypeORM adapter
        - Prisma adapter
        - Cache
        - Testing helpers
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR for this / PR을 직접 제출할 의향이 있습니다
