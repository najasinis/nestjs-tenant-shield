name: Bug Report
description: Report a bug or unexpected behavior / 버그 또는 예상치 못한 동작 보고
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **Before filing:** Please check [critical-notes.md](../../docs/critical-notes.md) and existing issues first.
        **제출 전:** [critical-notes.md](../../docs/critical-notes.md)와 기존 이슈를 먼저 확인해 주세요.

  - type: input
    id: version
    attributes:
      label: nestjs-tenant-shield version
      placeholder: "e.g. 0.1.1"
    validations:
      required: true

  - type: dropdown
    id: orm
    attributes:
      label: ORM
      options:
        - TypeORM
        - Prisma
        - Both
        - Neither (core only)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description / 버그 설명
      description: Clear description of what happened vs. what you expected.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce / 재현 방법
      placeholder: |
        1. Configure TenantShieldModule.forRoot({ ... })
        2. Call service.findAll() without tenant context
        3. Expected: MissingTenantContextError
        4. Actual: No error thrown
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: forRoot() Config (sanitized) / 설정 (민감정보 제거)
      render: typescript
      placeholder: |
        TenantShieldModule.forRoot({
          strategy: 'discriminator',
          tenantIdField: 'tenantId',
          tenantSource: 'header',
          strictMode: true,
        })

  - type: checkboxes
    id: security
    attributes:
      label: Security Impact / 보안 영향
      options:
        - label: This bug could cause cross-tenant data leakage / 이 버그로 cross-tenant 데이터 누출이 발생할 수 있음
          required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment / 환경
      placeholder: |
        - Node.js: 20.x
        - NestJS: 11.x
        - TypeORM: 0.3.x / Prisma: 5.x
        - OS: macOS / Ubuntu
