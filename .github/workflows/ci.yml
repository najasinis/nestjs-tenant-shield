name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }} / Nest ${{ matrix.nestjs-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        nestjs-version: [10, 11]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Override NestJS to v${{ matrix.nestjs-version }}
        if: matrix.nestjs-version != 11
        run: |
          npm install --no-save --legacy-peer-deps \
            @nestjs/common@${{ matrix.nestjs-version }} \
            @nestjs/core@${{ matrix.nestjs-version }} \
            @nestjs/testing@${{ matrix.nestjs-version }} \
            @nestjs/platform-express@${{ matrix.nestjs-version }} \
            @nestjs/typeorm@${{ matrix.nestjs-version }}

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -p tsconfig.build.json --noEmit

      - name: Unit & e2e tests
        run: npm test -- --forceExit
        env:
          NODE_ENV: test

  hardening:
    name: Hardening Gate (Node ${{ matrix.node-version }} / Nest ${{ matrix.nestjs-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        nestjs-version: [10, 11]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Override NestJS to v${{ matrix.nestjs-version }}
        if: matrix.nestjs-version != 11
        run: |
          npm install --no-save --legacy-peer-deps \
            @nestjs/common@${{ matrix.nestjs-version }} \
            @nestjs/core@${{ matrix.nestjs-version }} \
            @nestjs/testing@${{ matrix.nestjs-version }} \
            @nestjs/platform-express@${{ matrix.nestjs-version }} \
            @nestjs/typeorm@${{ matrix.nestjs-version }}

      - name: Hardening gate (B-1 ~ B-6b)
        run: npm run test:hardening
        env:
          NODE_ENV: test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, hardening]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Check dist exists
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          echo "Build artifacts verified"
